<div class="overlay" (click)="onOverlayClick($event)">
  <div class="modal">
    <div class="modal-head">
      <span>{{ editData ? 'Edit Customer' : 'Add New Customer' }}</span>
      <button (click)="onCancel()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-ctrl" type="text" placeholder="First name" [(ngModel)]="form.firstName" />
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-ctrl" type="text" placeholder="Last name" [(ngModel)]="form.lastName" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-ctrl" [(ngModel)]="form.role">
            <option value="Customer">Customer</option>
            <option value="Manager">Manager</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Account Balance ($)</label>
          <input class="form-ctrl" type="number" placeholder="0.00" [(ngModel)]="form.accountBalance" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input class="form-ctrl" type="date" [(ngModel)]="form.startDate" />
        </div>
        <div class="form-group">
          <label class="form-label">Account ID</label>
          <input class="form-ctrl" type="text" placeholder="ACC-00000" [(ngModel)]="form.accountId" />
        </div>
      </div>
      @if (showError) {
        <p class="form-error">Please enter at least a first or last name.</p>
      }
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-add"    (click)="onSave()">{{ editData ? 'Save Changes' : 'Create Account' }}</button>
    </div>
  </div>
</div>
